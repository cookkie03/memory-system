services:
  # === Qdrant Vector Database ===
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # === Ollama LLM Server ===
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Per GPU NVIDIA, decommentare:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # === RAG Chat (interattiva locale) ===
  rag:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
      - rag_cache:/app/.cache
    depends_on:
      - qdrant
      - ollama
    stdin_open: true
    tty: true
    command: python main.py chat

  # === MCP Server (accessibile da client MCP esterni) ===
  mcp:
    build: .
    env_file:
      - .env
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
      - rag_cache:/app/.cache
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped
    command: python main.py mcp --sse

volumes:
  qdrant_data:
  ollama_data:
  rag_cache:
