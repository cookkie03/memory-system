# ============================================================
# RAG System - Configurazione Centralizzata
# Modifica SOLO questo file per configurare l'intero sistema
# ============================================================

# === PERCORSI ===
documents_path: "./data"
output_path: "./output"

# === LLM (OpenAI-compatible) ===
# Funziona con: Ollama, LM Studio, vLLM, OpenAI, Together, qualsiasi API OpenAI-compatible
# API key: configurare SOLO via variabile d'ambiente LLM_API_KEY (vedi .env.example)
llm:
  base_url: "http://ollama:11434/v1"
  model: "qwen3:8b"
  temperature: 0.3
  max_tokens: 4096
  system_prompt: >
    Sei un assistente RAG intelligente. Hai accesso a tool per cercare documenti,
    gestire la memoria e creare file. Usa i tool appropriati per rispondere.
    Cita le fonti quando possibile. Se non hai informazioni sufficienti, dillo.

# === EMBEDDING MULTIMODALI (dual-model) ===
embeddings:
  primary:
    model: "jinaai/jina-embeddings-v4"
    dimension: 1024
    task_passage: "retrieval.passage"
    task_query: "retrieval.query"
    trust_remote_code: true
  secondary:
    model: "nvidia/NV-Embed-v2"
    dimension: 4096
    trust_remote_code: true
  # "primary", "secondary", "auto" (sceglie in base al tipo file)
  active: "primary"

# === CHUNKING ===
chunk_size: 1024
chunk_overlap: 200
chunking_mode: "sentence"
min_text_length: 50

# === QDRANT ===
qdrant:
  mode: "http"
  host: "qdrant"
  port: 6333
  collection: "documents"
  local_path: "./qdrant_storage"

# === RICERCA ===
search:
  top_k: 10
  similarity_threshold: 0.7
  adaptive_threshold: true
  adaptive_threshold_min: 0.5
  adaptive_threshold_max: 0.9
  rerank_enabled: true
  rerank_model: "jinaai/jina-reranker-v2-base-multilingual"
  rerank_top_n: 30
  rerank_alpha: 0.4

# === MEMORIA (mem0) ===
# mem0 condivide la knowledge base con RAG (cartella data/)
# Durante l'ingestione, i chunk vengono aggiunti sia a Qdrant (RAG) sia a mem0
memory:
  enabled: true
  user_id: "default"
  mem0_config:
    vector_store:
      provider: "qdrant"
      config:
        host: "qdrant"
        port: 6333
        collection_name: "mem0_memories"
    llm:
      provider: "ollama"
      config:
        model: "qwen3:8b"
        ollama_base_url: "http://ollama:11434"
    embedder:
      provider: "ollama"
      config:
        model: "nomic-embed-text"
        ollama_base_url: "http://ollama:11434"
    version: "v1.1"

# === ESTRAZIONE DOCUMENTI ===
# dots.ocr: UNICO strumento per PDF, immagini, documenti → testo
# Whisper: UNICO strumento per audio → testo
# Video: audio track → Whisper + keyframes → dots.ocr
ocr:
  engine: "dots"
  languages: ["en", "it"]

whisper_model: "turbo"

# === PROCESSING ===
hash_buffer_size: 8192

# === ESTENSIONI SUPPORTATE ===
extensions:
  text:
    - ".txt"
    - ".md"
    - ".py"
    - ".js"
    - ".ts"
    - ".json"
    - ".yaml"
    - ".yml"
    - ".xml"
    - ".html"
    - ".htm"
    - ".css"
    - ".csv"
    - ".log"
    - ".java"
    - ".cpp"
    - ".c"
    - ".cs"
    - ".go"
    - ".rb"
    - ".php"
    - ".sh"
    - ".bash"
    - ".sql"
  pdf:
    - ".pdf"
  audio:
    - ".mp3"
    - ".m4a"
    - ".opus"
    - ".wav"
    - ".ogg"
    - ".flac"
  image:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".bmp"
    - ".tiff"
    - ".webp"
  video:
    - ".mp4"
    - ".mkv"
    - ".avi"
    - ".mov"
    - ".webm"
  notebook:
    - ".ipynb"
  excel:
    - ".xlsx"
    - ".xls"
  presentation:
    - ".pptx"

# === NOTE DI DESIGN ===
# Caso d'uso di riferimento (guida il design, non implementato direttamente):
# Studente carica materiale corso lingua (documenti, video), fa mock exam,
# viene assistito domanda per domanda con brainstorming, writing/speaking
# analysis (pronuncia, vocabolario, coesione). Richiede: chat ricorsiva
# con contesto, memoria tra sessioni, multimodalita', output strutturato.
